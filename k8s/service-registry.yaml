apiVersion: v1
kind: Service
metadata:
  name: service-registry
spec:
  ports:
    - port: 8761
      targetPort: 8761
  selector:
    app: service-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
        - name: service-registry
          image: otniel217/ecom-service-registry:latest
          ports:
            - containerPort: 8761
          env:
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"