apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    # Si tu utilises NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # Optionnel : pour augmenter la taille maximale des uploads (si besoin)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: api.mon-projet.com  # Remplace par ton domaine ou retire la ligne host pour accepter tout
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80 # Le port exposé par ton service api-gateway